<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meu Site</title>
  <style>
    body{
      margin:0;
      font-family:Arial, sans-serif;
      background:#000;
      color:#fff;
      display:flex;
    }

    .menu{
      width:220px;
      min-height:100vh;
      background:#111;
      padding:20px;
      box-sizing:border-box;
    }

    .menu h2{
      margin-top:0;
      color:#fff;
    }

    .menu a{
      display:block;
      color:#ccc;
      text-decoration:none;
      margin:12px 0;
    }

    .menu a:hover{
      color:#fff;
    }

    .conteudo{
      flex:1;
      padding:40px;
    }

    h1{
      margin-top:0;
    }
  </style>
</head>
<body>
  <div class="menu">
    <h2>Menu</h2>
    <a href="#">Início</a>
    <a href="#">Sobre</a>
    <a href="#">Serviços</a>
    <a href="#">Contato</a>
  </div>

  <div class="conteudo">
    <h1>Meu primeiro site</h1>
    <p>Site criado grátis com GitHub Pages.</p>
  </div>
</body>
</html>
